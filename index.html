<script>
    // JavaScript to handle form submission
    document.getElementById("contactForm").addEventListener("submit", function(event) {
        event.preventDefault();  // Prevent the default form submission

        // Collect form data
        const formData = {
            name: document.getElementById("jwFormRvqkzS_dynamic-form-3021365-10579942").value,
            email: document.getElementById("jwFormUS9sTJ_dynamic-form-3021365-10579943").value,
            message: document.getElementById("jwForm4sNyfJ_dynamic-form-3021365-10579944").value
        };

        // Send data to the Flask backend
        fetch("http://localhost:5000/contact_form", {  // Update URL if Flask is deployed elsewhere
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            // Display the response message
            const responseMessage = document.createElement("div");
            responseMessage.id = "responseMessage";
            responseMessage.style.marginTop = "20px";
            responseMessage.style.color = data.response.includes("Thank you") ? "green" : "red";  // Green for success, red for errors
            responseMessage.textContent = data.response;
            
            // Append or replace the response message in the form container
            const formContainer = document.querySelector(".jw-form-container");
            const existingMessage = document.getElementById("responseMessage");
            if (existingMessage) {
                formContainer.replaceChild(responseMessage, existingMessage);
            } else {
                formContainer.appendChild(responseMessage);
            }
        })
        .catch(error => {
            console.error("Error:", error);
            const responseMessage = document.createElement("div");
            responseMessage.id = "responseMessage";
            responseMessage.style.marginTop = "20px";
            responseMessage.style.color = "red";
            responseMessage.textContent = "An error occurred while submitting the form.";
            
            // Append or replace the response message in the form container
            const formContainer = document.querySelector(".jw-form-container");
            const existingMessage = document.getElementById("responseMessage");
            if (existingMessage) {
                formContainer.replaceChild(responseMessage, existingMessage);
            } else {
                formContainer.appendChild(responseMessage);
            }
        });
    });
</script>
